name: Deploy AllDocs to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (all workspaces)
        run: |
          npm ci
          test -d node_modules/@rollup/rollup-linux-x64-gnu || npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build VitePress site
        working-directory: ./AllDocs
        run: npx vitepress build --base=/NKUI/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./AllDocs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
